<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luftqualitaet Zeitreihe</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; padding: 16px;
           display: flex; flex-direction: column; }
    h2 { font-size: 15px; margin-bottom: 2px; }
    .meta { font-size: 11px; color: #888; margin-bottom: 6px; }
    .meta a { color: #7eb8d4; }
    .station-info { font-size: 11px; color: #aaa; margin-bottom: 6px; padding: 4px 8px;
      background: rgba(126,184,212,0.08); border-left: 3px solid #7eb8d4; border-radius: 3px; }
    #plot { flex: 1; min-height: 300px; }
    .footer { font-size: 10px; color: #555; margin-top: 6px; }
    .footer a { color: #7eb8d4; }
    .error { color: #e05252; padding: 20px; }
  </style>
</head>
<body>
  <h2 id="title">Luftqualitaet — laedt …</h2>
  <div class="meta" id="meta">
    Quelle: <a href="https://ads.atmosphere.copernicus.eu/datasets/cams-europe-air-quality-forecasts" target="_blank">CAMS European Air Quality Forecasts</a>
  </div>
  <div id="station-info" class="station-info" style="display:none"></div>
  <div id="plot"></div>
  <div class="footer">
    <a href="https://github.com/synapticore-io/dust-analyzer" target="_blank">synapticore-io/dust-analyzer</a>
    · Daten taeglich 14:00 UTC
  </div>
  <div id="error" class="error" style="display:none"></div>
  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@1.3.2/app-with-deps";

    const app = new App({ name: "Dust Analyzer Timeseries", version: "4.0.0" });
    const errEl = document.getElementById("error");
    const plotEl = document.getElementById("plot");

    function hex2rgba(hex, a) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function render(data) {
      errEl.style.display = "none";
      if (!data || data.error) {
        errEl.style.display = "block";
        errEl.textContent = data?.error || "Keine Daten.";
        return;
      }

      const series = data.series || {};
      const keys = Object.keys(series);
      if (!keys.length) return;

      const modeLabel = data.mode === "forecast" ? " · Prognose" :
                        data.mode === "analysis" ? " · Analyse" : "";
      document.getElementById("title").textContent =
        `${data.city} · ${data.date_from} bis ${data.date_to}${modeLabel}`;
      document.getElementById("meta").innerHTML =
        'Quelle: <a href="https://ads.atmosphere.copernicus.eu/datasets/cams-europe-air-quality-forecasts" target="_blank">CAMS</a>' +
        ' · Bodenniveau (0 m, Ensemble-Mittel)';

      if (data.station) {
        const s = data.station;
        const el = document.getElementById("station-info");
        el.style.display = "block";
        el.textContent = `UBA Station: ${s.name} (${s.code}) · ${s.distance_km} km · gestrichelt = Station`;
      }

      const traces = [];
      keys.forEach(key => {
        const v = series[key];
        traces.push({
          x: v.time, y: v.values,
          name: v.label,
          type: "scatter", mode: "lines",
          line: { color: hex2rgba(v.color, 0.9), width: 2 },
          hovertemplate: "%{y:.1f} ug/m3<extra>" + v.label + "</extra>",
        });
      });

      const stSeries = data.station_series || {};
      Object.keys(stSeries).forEach(sKey => {
        const sv = stSeries[sKey];
        if (!keys.includes(sKey)) return;
        traces.push({
          x: sv.time, y: sv.values,
          name: sv.label + " (UBA)",
          type: "scatter", mode: "lines",
          line: { color: hex2rgba(sv.color, 0.5), width: 1.5, dash: "dot" },
          hovertemplate: "%{y:.1f} ug/m3<extra>" + sv.label + " (UBA)</extra>",
        });
      });

      const h = plotEl.clientHeight || 500;
      Plotly.newPlot(plotEl, traces, {
        height: h,
        template: "plotly_dark",
        paper_bgcolor: "#0f1117",
        plot_bgcolor: "#0f1117",
        showlegend: true,
        legend: { orientation: "h", x: 0.5, xanchor: "center", y: -0.18, yanchor: "top",
                  font: { size: 12, color: "#ccc" } },
        hovermode: "x unified",
        margin: { t: 8, b: 70, l: 50, r: 16 },
        xaxis: {
          tickformat: "%d.%m.\n%H:%M",
          tickfont: { size: 10, color: "#aaa" },
          gridcolor: "rgba(255,255,255,0.05)",
        },
        yaxis: {
          autorange: true, rangemode: "tozero",
          title: { text: "ug/m3", font: { size: 11, color: "#666" } },
          tickfont: { size: 10, color: "#aaa" },
          gridcolor: "rgba(255,255,255,0.05)",
        },
      }, { responsive: true, displayModeBar: true, displaylogo: false,
           modeBarButtonsToRemove: ["select2d", "lasso2d", "autoScale2d"] });
    }

    app.ontoolresult = (params) => {
      if (params.isError) {
        errEl.style.display = "block";
        const sc = params.structuredContent;
        errEl.textContent = (sc?.error) || params.content?.find(c => c.type === "text")?.text || "Fehler";
        return;
      }
      render(params.structuredContent);
    };

    try { await app.connect(); } catch (e) {
      errEl.style.display = "block";
      errEl.textContent = "MCP Verbindung fehlgeschlagen: " + (e?.message || e);
    }
  </script>
</body>
</html>
