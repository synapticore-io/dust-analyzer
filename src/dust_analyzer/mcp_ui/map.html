<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luftqualität Karte</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; padding: 16px; }
    h2 { font-size: 16px; margin-bottom: 4px; }
    .meta { font-size: 12px; color: #888; margin-bottom: 10px; }
    .meta a { color: #7eb8d4; }
    .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; font-size: 13px; }
    .controls select {
      background: #1a1e2a; color: #e0e0e0; border: 1px solid #333;
      padding: 4px 8px; border-radius: 4px; font-size: 13px;
    }
    #plot { height: 72vh; width: 100%; border-radius: 8px; overflow: hidden; }
    .error { color: #e05252; padding: 20px; }
  </style>
</head>
<body>
  <h2 id="title">Luftqualität — lädt …</h2>
  <div class="meta">
    Quelle: <a href="https://ads.atmosphere.copernicus.eu/datasets/cams-europe-air-quality-forecasts" target="_blank">CAMS European Air Quality Forecasts</a>
    · Heatmap auf OpenStreetMap
  </div>
  <div class="controls">
    <label for="var-select">Variable:</label>
    <select id="var-select"></select>
  </div>
  <div id="plot"></div>
  <div id="error" class="error" style="display:none"></div>
  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@1.3.2/app-with-deps";

    const COLORSCALES = { dust: 'YlOrBr', so2: 'Reds', pm2p5: 'Blues' };
    let allVars = {};
    let centerLat = 50, centerLon = 10;

    function percentile(arr, p) {
      const sorted = [...arr].filter(v => v > 0).sort((a, b) => a - b);
      if (!sorted.length) return 1;
      const idx = Math.floor(sorted.length * p);
      return sorted[Math.min(idx, sorted.length - 1)];
    }

    function renderVar(key) {
      const v = allVars[key];
      if (!v) return;

      const p75 = percentile(v.values, 0.75);
      const p95 = percentile(v.values, 0.95);

      Plotly.react('plot', [{
        type: 'densitymapbox',
        lat: v.lats,
        lon: v.lons,
        z: v.values,
        radius: 25,
        colorscale: COLORSCALES[key] || 'YlOrRd',
        zmin: 0,
        zmax: p75 + (p95 - p75) * 0.5,
        opacity: 0.75,
        colorbar: {
          title: { text: v.label, font: { size: 11, color: '#aaa' } },
          tickfont: { size: 10, color: '#aaa' },
          thickness: 14,
          len: 0.5,
        },
        hovertemplate: '<b>%{z:.1f} µg/m³</b><br>%{lat:.2f}°N, %{lon:.2f}°E<extra>' + v.label + '</extra>',
      }], {
        template: 'plotly_dark',
        paper_bgcolor: '#0f1117',
        mapbox: {
          style: 'open-street-map',
          center: { lat: centerLat, lon: centerLon },
          zoom: 5,
        },
        margin: { t: 10, r: 10, l: 10, b: 10 },
      }, {
        responsive: true,
        displayModeBar: true,
        displaylogo: false,
        modeBarButtonsToRemove: ['select2d', 'lasso2d'],
      });
    }

    const app = new App({ name: "Dust Analyzer Map", version: "3.0.0" });
    const errEl = document.getElementById('error');
    const sel = document.getElementById('var-select');

    sel.addEventListener('change', () => renderVar(sel.value));

    function renderStructured(data) {
      errEl.style.display = 'none';
      try {
        if (!data || typeof data !== 'object') {
          errEl.style.display = 'block';
          errEl.textContent = 'Keine structuredContent vom Tool.';
          return;
        }
        if (data.error) {
          errEl.style.display = 'block';
          errEl.textContent = String(data.error);
          return;
        }

        allVars = data.variables || {};
        centerLat = data.center_lat ?? 50;
        centerLon = data.center_lon ?? 10;

        sel.innerHTML = '';
        const keys = Object.keys(allVars);
        keys.forEach(k => {
          const opt = document.createElement('option');
          opt.value = k;
          opt.textContent = allVars[k].label || k;
          sel.appendChild(opt);
        });

        document.getElementById('title').textContent =
          `Luftqualität · ${centerLat.toFixed(1)}°N, ${centerLon.toFixed(1)}°E · ${data.timestamp || ''}`;

        if (keys.length) renderVar(keys[0]);
      } catch (e) {
        errEl.style.display = 'block';
        errEl.textContent = 'Fehler: ' + e.message;
      }
    }

    app.ontoolresult = (params) => {
      if (params.isError) {
        errEl.style.display = 'block';
        const sc = params.structuredContent;
        errEl.textContent =
          (sc && typeof sc === 'object' && sc.error != null && String(sc.error)) ||
          params.content?.find((c) => c.type === 'text')?.text ||
          'Tool-Fehler';
        return;
      }
      renderStructured(params.structuredContent);
    };

    try {
      await app.connect();
    } catch (e) {
      errEl.style.display = 'block';
      errEl.textContent = 'ui/initialize fehlgeschlagen: ' + (e && e.message ? e.message : String(e));
      console.error(e);
    }
  </script>
</body>
</html>
