<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staedtevergleich</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; padding: 16px;
           display: flex; flex-direction: column; }
    h2 { font-size: 15px; margin-bottom: 2px; }
    .meta { font-size: 11px; color: #888; margin-bottom: 6px; }
    #plot { flex: 1; min-height: 300px; }
    .footer { font-size: 10px; color: #555; margin-top: 6px; }
    .footer a { color: #7eb8d4; }
    .error { color: #e05252; padding: 20px; }
  </style>
</head>
<body>
  <h2 id="title">Staedtevergleich — laedt …</h2>
  <div class="meta" id="meta"></div>
  <div id="plot"></div>
  <div class="footer">
    <a href="https://github.com/synapticore-io/dust-analyzer" target="_blank">synapticore-io/dust-analyzer</a>
  </div>
  <div id="error" class="error" style="display:none"></div>
  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@1.3.2/app-with-deps";

    const COLORS = ["#7eb8d4", "#e05252", "#c8a96e", "#6ecf72", "#d4a07e"];
    const app = new App({ name: "Dust Analyzer Compare", version: "3.0.0" });
    const errEl = document.getElementById("error");
    const plotEl = document.getElementById("plot");

    function render(data) {
      errEl.style.display = "none";
      if (!data || data.error) {
        errEl.style.display = "block";
        errEl.textContent = data?.error || "Keine Daten.";
        return;
      }

      const cities = data.cities || [];
      if (!cities.length) {
        errEl.style.display = "block";
        errEl.textContent = "Keine Vergleichsdaten.";
        return;
      }

      const label = data.variable_label || data.variable || "Variable";
      document.getElementById("title").textContent = label + " — Staedtevergleich";
      document.getElementById("meta").textContent =
        data.date_from + " bis " + data.date_to + " · " + cities.length + " Staedte · Bodenniveau (0 m)";

      const traces = cities.map((c, i) => ({
        x: c.time, y: c.values,
        name: c.city,
        mode: "lines",
        line: { color: COLORS[i % COLORS.length], width: 2.5 },
        hovertemplate: "<b>" + c.city + "</b> %{y:.1f} ug/m3<extra></extra>",
      }));

      const h = plotEl.clientHeight || 500;
      Plotly.newPlot(plotEl, traces, {
        height: h,
        template: "plotly_dark",
        paper_bgcolor: "#0f1117",
        plot_bgcolor: "#0f1117",
        showlegend: true,
        legend: { orientation: "h", x: 0.5, xanchor: "center", y: -0.18, yanchor: "top",
                  font: { size: 12, color: "#ccc" } },
        hovermode: "x unified",
        margin: { t: 8, b: 70, l: 50, r: 16 },
        xaxis: {
          tickformat: "%d.%m.\n%H:%M",
          tickfont: { size: 10, color: "#aaa" },
          gridcolor: "rgba(255,255,255,0.05)",
        },
        yaxis: {
          autorange: true, rangemode: "tozero",
          title: { text: label, font: { size: 11, color: "#666" } },
          tickfont: { size: 10, color: "#aaa" },
          gridcolor: "rgba(255,255,255,0.05)",
        },
      }, { responsive: true, displayModeBar: true, displaylogo: false,
           modeBarButtonsToRemove: ["select2d", "lasso2d"] });
    }

    app.ontoolresult = (params) => {
      if (params.isError) {
        errEl.style.display = "block";
        errEl.textContent = params.structuredContent?.error ||
          params.content?.find(c => c.type === "text")?.text || "Fehler";
        return;
      }
      render(params.structuredContent);
    };

    try { await app.connect(); } catch (e) {
      errEl.style.display = "block";
      errEl.textContent = "MCP Verbindung fehlgeschlagen: " + (e?.message || e);
    }
  </script>
</body>
</html>
