name: Update Air Quality Plot

on:
  schedule:
    - cron: "0 14 * * *"  # daily 14:00 UTC — CAMS analysis data for D-1 available by then
  workflow_dispatch:       # manual trigger

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Write CAMS API credentials
        run: |
          echo "url: https://ads.atmosphere.copernicus.eu/api" > ~/.cdsapirc
          echo "key: ${{ secrets.CAMS_API_KEY }}" >> ~/.cdsapirc

      - name: Generate plot
        run: |
          mkdir -p _site
          uv run dust-analyzer --lat 52.37 --lon 9.73 --days 14 --no-cache --out _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
