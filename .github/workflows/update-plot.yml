name: Update Air Quality Plot

on:
  schedule:
    - cron: "0 10 * * *"  # täglich 10:00 UTC (nach CAMS-Update um 08:30 UTC)
  workflow_dispatch:       # manuell triggerbar

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Write CAMS API credentials
        run: |
          echo "url: https://ads.atmosphere.copernicus.eu/api" > ~/.cdsapirc
          echo "key: ${{ secrets.CAMS_API_KEY }}" >> ~/.cdsapirc

      - name: Generate plot
        run: |
          mkdir -p docs
          uv run dust-analyzer --lat 52.37 --lon 9.73 --days 14 --out docs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: "chore: update air quality plot ${{ github.run_id }}"
